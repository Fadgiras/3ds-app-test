name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1) Compile le homebrew avec le toolchain devkitARM (image officielle).
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .3dsx
        run: make

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: ncch-inputs
          path: |
            *.3dsx
            *.elf
            *.smdh

  # 2) Empaquette en .cia avec makerom (hors conteneur : glibc recente OK)
  #    et publie la release. makerom n'a besoin que de l'elf/smdh/banner/rsf.
  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: ncch-inputs
          path: .

      - name: Install makerom
        run: |
          set -eux
          tmp="$(mktemp -d)"; cd "$tmp"
          curl -sL -o makerom.zip \
            https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.19.0/makerom-v0.19.0-ubuntu_x86_64.zip
          unzip -q makerom.zip
          sudo install -Dm755 "$(find . -name makerom -type f | head -n1)" /usr/local/bin/makerom

      - name: Package .cia
        run: |
          set -eux
          elf="$(ls *.elf | head -n1)"
          smdh="$(ls *.smdh | head -n1)"
          makerom -f cia -o 3ds-app-test.cia -target t -exefslogo \
            -rsf tools/stereo-cube.rsf \
            -elf "$elf" -icon "$smdh" -banner banner.bnr

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-app-test
          path: |
            *.3dsx
            *.cia

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.3dsx
            *.cia
