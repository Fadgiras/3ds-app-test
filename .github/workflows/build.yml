name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install makerom
        run: |
          set -eux
          tmp="$(mktemp -d)"; cd "$tmp"
          curl -sL -o makerom.zip \
            https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.19.0/makerom-v0.19.0-ubuntu_x86_64.zip
          unzip -q makerom.zip
          install -Dm755 "$(find . -name makerom -type f | head -n1)" "$DEVKITPRO/tools/bin/makerom"

      - name: Build .3dsx and .cia
        run: |
          set -eux
          make
          make cia

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-app-test
          path: |
            *.3dsx
            *.cia

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.3dsx
            *.cia
