name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBIAN_FRONTEND: noninteractive
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devkitPro (3ds-dev)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman
          sudo dkp-pacman -Sy --noconfirm
          sudo dkp-pacman -S  --noconfirm --needed 3ds-dev
          echo "/opt/devkitpro/tools/bin" >> "$GITHUB_PATH"

      - name: Install makerom
        run: |
          set -eux
          tmp="$(mktemp -d)"; cd "$tmp"
          curl -sL -o makerom.zip \
            https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.19.0/makerom-v0.19.0-ubuntu_x86_64.zip
          unzip -q makerom.zip
          sudo install -Dm755 "$(find . -name makerom -type f | head -n1)" /opt/devkitpro/tools/bin/makerom

      - name: Build .3dsx and .cia
        run: |
          set -eux
          make
          make cia

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3ds-app-test
          path: |
            *.3dsx
            *.cia

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.3dsx
            *.cia
